 
<div   class="fixed backdrop-blur-lg  inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="  border-2 border-[#a21892] rounded-xl p-4 shadow-lg">
        <h3 class="text-xl text-[#a21892] font-bold mb-4">Modifier votre nom d'utilisateur</h3>
        
        <form method="post" action="{% url 'update_username' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-slate-100 mb-2">Nouveau nom d'utilisateur</label>
                <input type="text" name="username" value="{{ user.username }}" 
                       class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#a21892]">
            </div>
            
            <div class="flex justify-end gap-3">
                <button type="button" onclick="closePopup_username()" 
                        class="px-4 py-2 text-slate-100 hover:text-gray-300 transition">
                    Annuler
                </button>
                <button type="submit" 
                        class="px-4 py-2 bg-[#a21892] text-white rounded-lg hover:bg-[#8a147a] transition">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function closePopup_username() {
    document.querySelector('.fixed').remove();
}
</script>
